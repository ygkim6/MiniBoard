name: SMBoard CI/CD Pipeline

# Jenkins의 pollSCM('* * * * *') 역할
# main 브랜치에 코드가 push 될 때마다 자동으로 실행
on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    #runs-on: ubuntu-latest # Jenkins의 agent any 역할 (깃허브가 제공하는 리눅스 서버)
    runs-on: self-hosted # Jenkins의 agent any 역할 (깃허브가 제공하는 리눅스 서버)

    steps:
      # 1. 소스코드 가져오기
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Java 환경 세팅 (버전은 프로젝트에 맞게 수정)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Compile & Build
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile and Build
        run: |
          ./gradlew compileJava
          ./gradlew build
          cp ./build/libs/MiniBoard-0.0.1-SNAPSHOT.jar ./docker/smboard/
          ls -lah ./docker/smboard/

      # 4. Docker Login
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USR }}
          password: ${{ secrets.DOCKERHUB_PSW }}

      # 5. Docker Image Build & Push
      # Jenkins의 ${BUILD_NUMBER}는 ${{ github.run_number }}로 대체.
      - name: Build and Push Docker Images
        run: |
          # Build
          docker build -t saidren/apache2_smboard:${{ github.run_number }} ./docker/apache2/
          docker build -t saidren/smboard_smboard:${{ github.run_number }} ./docker/smboard/
          docker build -t saidren/mariadb_smboard:${{ github.run_number }} ./docker/mariadb/
          
          # Push
          docker push saidren/apache2_smboard:${{ github.run_number }}
          docker push saidren/smboard_smboard:${{ github.run_number }}
          docker push saidren/mariadb_smboard:${{ github.run_number }}
          
          # Clean up (깃허브 호스팅 러너는 쓰고 버려지므로 사실 생략해도 됨)
          docker image rm saidren/apache2_smboard:${{ github.run_number }}
          docker image rm saidren/smboard_smboard:${{ github.run_number }}
          docker image rm saidren/mariadb_smboard:${{ github.run_number }}

      
      # 6. Kubernetes Deploy (원격 클러스터 접속 설정)
      #- name: Setup Kubeconfig
      #  uses: azure/k8s-set-context@v3
      #  with:
      #    method: kubeconfig
      #    kubeconfig: ${{ secrets.KUBE_CONFIG_DATA }}
      
      - name: Deploy to Kubernetes
        run: |
          sed -i 's/{{VERSION}}/${{ github.run_number }}/g' ./kubernetes/apache2.yml
          sed -i 's/{{VERSION}}/${{ github.run_number }}/g' ./kubernetes/smboard.yml
          sed -i 's/{{VERSION}}/${{ github.run_number }}/g' ./kubernetes/mariadb.yml
          
          kubectl apply -f ./kubernetes/mariadb.yml
          kubectl apply -f ./kubernetes/smboard.yml
          kubectl apply -f ./kubernetes/apache2.yml
          kubectl apply -f ./kubernetes/ingress.yml

      # 7. Slack 알림 (성공 시)
      - name: Slack Notification (Success)
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "channel": "#it교육",
              "text": "✅ smboard 배포가 성공하였습니다."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # 8. Slack 알림 (실패 시)
      - name: Slack Notification (Failure)
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "channel": "#it교육",
              "text": "❌ smboard 배포가 실패하였습니다."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
